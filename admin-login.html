<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="admin-login-styles.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>
  <h1>Admin Login</h1>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <div id="loginStatus"></div>

  <script src="firebase-config.js"></script>
  <script>
    const auth = firebase.auth();
    const loginForm = document.getElementById('loginForm');
    const loginStatus = document.getElementById('loginStatus');
    const adminUIDs = ['qVVVy5UkrCUiyQlzyhbdAU01x6b2']; // Update with real UIDs

    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          if (adminUIDs.includes(userCredential.user.uid)) {
            loginStatus.textContent = 'Login successful! Redirecting...';
            setTimeout(() => {
              window.location.href = 'admin-dashboard.html';
            }, 1000);
          } else {
            auth.signOut();
            loginStatus.textContent = 'Access denied: Not an admin.';
          }
        })
        .catch(error => {
          loginStatus.textContent = 'Login failed: ' + error.message;
        });
    });
  </script>
</body>
</html>
